<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>比奇堡娱乐中心</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-blue: #0077b6;
    --ocean-blue: #00b4d8;
    --light-ocean: #90e0ef;
    --surface: #caf0f8;
    --pineapple: #FFD700;
    --pineapple-dark: #FFA500;
    --jellyfish: #FF69B4;
    --coral: #7B68EE;
    --seaweed: #32CD32;
    --sand: #FFF8DC;
    --text-dark: #2d1b69;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
    background: #023e8a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .phone-frame {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 900px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--deep-blue) 0%, var(--ocean-blue) 35%, var(--light-ocean) 65%, var(--surface) 100%);
    box-shadow: 0 0 60px rgba(0,180,216,0.3);
  }
  @media (min-width: 481px) {
    .phone-frame {
      border-radius: 24px;
      height: 90vh;
      margin: 2vh 0;
    }
  }
  /* 海草 */
  .seaweed { position: absolute; bottom: 0; font-size: 60px; animation: sway 3s ease-in-out infinite; transform-origin: bottom center; pointer-events: none; z-index: 5; }
  .seaweed.left { left: 10px; animation-delay: 0s; }
  .seaweed.right { right: 5px; animation-delay: 1.5s; }
  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  /* 标题区 */
  .header {
    text-align: center;
    padding: 24px 16px 12px;
    position: relative;
    z-index: 10;
  }
  .header .logo { font-size: 42px; margin-bottom: 4px; }
  .header h1 {
    font-family: 'Luckiest Guy', 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    color: var(--pineapple);
    text-shadow: 2px 2px 0 #c78500, 0 0 20px rgba(255,215,0,0.4);
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }
  /* 内容区 */
  .content-area {
    margin: 8px 16px;
    position: relative;
    z-index: 10;
    min-height: 340px;
  }
  .tool-panel {
    display: none;
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 28px 20px;
    min-height: 340px;
    backdrop-filter: blur(10px);
    border: 3px solid rgba(255,215,0,0.25);
    box-shadow: 0 8px 32px rgba(0,119,182,0.2);
    text-align: center;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .tool-panel.active { display: flex; }
  /* 底部Tab */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    background: linear-gradient(180deg, rgba(0,119,182,0.9) 0%, #023e8a 100%);
    padding: 10px 8px 18px;
    border-top: 3px solid var(--pineapple);
    z-index: 20;
  }
  .tab-btn {
    background: none;
    border: none;
    text-align: center;
    padding: 6px 10px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 62px;
    user-select: none;
    -webkit-user-select: none;
  }
  .tab-btn .icon { font-size: 26px; display: block; }
  .tab-btn .label { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .tab-btn.active { background: rgba(255,215,0,0.2); }
  .tab-btn.active .label { color: var(--pineapple); font-weight: bold; }
  .tab-btn:active { transform: scale(0.9); }
  /* 通用按钮 */
  .btn-bubble {
    background: linear-gradient(180deg, var(--pineapple) 0%, var(--pineapple-dark) 100%);
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    color: #8B6914;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,165,0,0.4);
    transition: transform 0.15s;
    letter-spacing: 1px;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-bubble:active { transform: scale(0.92); }
  /* 背景气泡 */
  .bubble {
    position: absolute;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
  }
  /* 水母 */
  .jellyfish-deco {
    position: absolute;
    font-size: 28px;
    animation: drift 12s ease-in-out infinite;
    pointer-events: none;
    opacity: 0.6;
  }
  @keyframes drift {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(30px) translateY(-15px); }
    50% { transform: translateX(-20px) translateY(-30px); }
    75% { transform: translateX(15px) translateY(-10px); }
  }
  .tool-icon { font-size: 52px; margin-bottom: 8px; }
  .tool-title {
    font-size: 18px;
    color: var(--deep-blue);
    margin-bottom: 16px;
    font-weight: bold;
  }
  .compliment-bubble {
    background: rgba(255,215,0,0.1);
    border: 2px dashed var(--pineapple);
    border-radius: 20px;
    padding: 20px 16px;
    margin-bottom: 16px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-dark);
    line-height: 1.6;
    position: relative;
    transition: all 0.3s ease;
  }
  .compliment-bubble.pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .bubble-particle {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    animation: particleUp 0.8s ease-out forwards;
  }
  @keyframes particleUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-80px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>
<div class="phone-frame" id="app">
  <div class="seaweed left">🌿</div>
  <div class="seaweed right">🌿</div>
  <div class="jellyfish-deco" style="top:12px;right:20px;animation-delay:0s;">🪼</div>
  <div class="jellyfish-deco" style="top:80px;left:16px;font-size:18px;animation-delay:5s;">🪼</div>

  <div class="header">
    <div class="logo">🍍</div>
    <h1>比奇堡娱乐中心</h1>
    <div class="subtitle">由海绵宝宝独家冠名播出 🧽</div>
  </div>

  <div class="content-area" id="contentArea">
    <div class="tool-panel active" id="panel-0">
      <div class="tool-icon">🧽</div>
      <h2 class="tool-title">海绵宝宝的夸夸气泡</h2>
      <div class="compliment-bubble" id="complimentText">
        戳一下泡泡<br>收获今日份快乐 ✨
      </div>
      <button class="btn-bubble" id="praiseBtn">🫧 吹一个泡泡</button>
      <div class="bubble-burst" id="bubbleBurst" style="position:relative;"></div>
    </div>
    <div class="tool-panel" id="panel-1"><h2>🐚 运势</h2></div>
    <div class="tool-panel" id="panel-2"><h2>🪼 密语</h2></div>
    <div class="tool-panel" id="panel-3"><h2>🦀 爱意值</h2></div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="0"><span class="icon">🧽</span><span class="label">夸夸</span></button>
    <button class="tab-btn" data-tab="1"><span class="icon">🐚</span><span class="label">运势</span></button>
    <button class="tab-btn" data-tab="2"><span class="icon">🪼</span><span class="label">密语</span></button>
    <button class="tab-btn" data-tab="3"><span class="icon">🦀</span><span class="label">爱意值</span></button>
  </div>
</div>
<script>
// Tab switching
const tabBtns = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tool-panel');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// Background bubbles
function createBubble() {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const size = Math.random() * 20 + 8;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.bottom = '-30px';
  bubble.style.animationDuration = (Math.random() * 6 + 6) + 's';
  bubble.style.animationDelay = '0s';
  document.getElementById('app').appendChild(bubble);
  setTimeout(() => bubble.remove(), 12000);
}
setInterval(createBubble, 2000);
createBubble(); createBubble(); createBubble();

// === 夸夸生成器 ===
const compliments = [
  "你比蟹老板还有钱！因为你拥有我的心 ❤️",
  "如果可爱能换蟹黄堡，你能养活整个比奇堡！🍔",
  "海绵宝宝抓水母还要用网，你抓我的心只用了一眼 👀",
  "派大星说：你是我见过最亮的星星！⭐",
  "珊迪都会嫉妒你的聪明才智！🐿️",
  "你的笑容比蟹黄堡秘方还珍贵！✨",
  "章鱼哥对你都说不出讨厌两个字 😤",
  "痞老板偷了一辈子秘方，都不及偷看你一眼 🦀",
  "你是比奇堡最靓的居民，没有之一！👑",
  "蟹老板愿意为你免费做一个蟹黄堡 🦀🍔",
  "海绵宝宝每天早上醒来想的第一个人就是你！🧽",
  "你的可爱程度已经超过了派大星的憨憨指数 📈",
  "比奇堡全体居民投票：你是最受欢迎的人类！🗳️",
  "连神奇海螺都说你很棒！🐚",
  "小蜗都为你鼓掌 👏🐌",
  "你的存在让比奇堡的海水都变甜了 🌊",
  "派大星说他愿意把最后一个蟹黄堡让给你 🍔❤️",
  "海绵宝宝：我准备好了！准备好爱你了！🧽💛",
  "你的美貌让水母田的水母都黯然失色 🪼",
  "珊迪说你的智商测试结果：满分！🧪",
  "蟹老板说他愿意花钱请你吃饭（这很罕见）💰",
  "你是比奇堡海滩上最耀眼的贝壳 🐚✨",
  "痞老板放弃偷秘方了，改偷你的心 💚",
  "海绵宝宝的菠萝屋欢迎你随时来做客！🍍",
  "你的魅力值：超过比奇堡所有居民的财产总和 📊",
  "派大星说你是他的'最好的最好朋友' 🥰",
  "连飞行荷兰人都想为你停留 ⛵",
  "泡泡先生表示你的快乐指数爆表 🫧",
  "你的可爱让比奇堡的太阳都更亮了 🌞",
  "虾霸说你比所有蟹黄堡加起来还美味 🍔💕"
];
let lastCompliments = [];
const MAX_HISTORY = 3;

function getCompliment() {
  const available = compliments.filter(c => !lastCompliments.includes(c));
  if (available.length === 0) {
    lastCompliments = [];
    return compliments[Math.floor(Math.random() * compliments.length)];
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  lastCompliments.push(pick);
  if (lastCompliments.length > MAX_HISTORY) lastCompliments.shift();
  return pick;
}

function burstBubbles() {
  const container = document.getElementById('bubbleBurst');
  const emojis = ['🫧', '💛', '✨', '🫧', '💫'];
  for (let i = 0; i < 8; i++) {
    const particle = document.createElement('span');
    particle.className = 'bubble-particle';
    particle.textContent = emojis[i % emojis.length];
    particle.style.left = (Math.random() * 60 - 30) + 'px';
    particle.style.animationDuration = (Math.random() * 0.6 + 0.4) + 's';
    particle.style.animationDelay = (Math.random() * 0.2) + 's';
    container.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
  }
}

document.getElementById('praiseBtn').addEventListener('click', function() {
  const textEl = document.getElementById('complimentText');
  textEl.textContent = getCompliment();
  textEl.classList.remove('pop');
  void textEl.offsetWidth;
  textEl.classList.add('pop');
  burstBubbles();
});
</script>
</body>
</html>
