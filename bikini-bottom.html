<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>比奇堡娱乐中心</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-blue: #0077b6;
    --ocean-blue: #00b4d8;
    --light-ocean: #90e0ef;
    --surface: #caf0f8;
    --pineapple: #FFD700;
    --pineapple-dark: #FFA500;
    --jellyfish: #FF69B4;
    --coral: #7B68EE;
    --seaweed: #32CD32;
    --sand: #FFF8DC;
    --text-dark: #2d1b69;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
    background: #023e8a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .phone-frame {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 900px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--deep-blue) 0%, var(--ocean-blue) 35%, var(--light-ocean) 65%, var(--surface) 100%);
    box-shadow: 0 0 60px rgba(0,180,216,0.3);
  }
  @media (min-width: 481px) {
    .phone-frame {
      border-radius: 24px;
      height: 90vh;
      margin: 2vh 0;
    }
  }
  /* 海草 */
  .seaweed { position: absolute; bottom: 0; font-size: 60px; animation: sway 3s ease-in-out infinite; transform-origin: bottom center; pointer-events: none; z-index: 5; }
  .seaweed.left { left: 10px; animation-delay: 0s; }
  .seaweed.right { right: 5px; animation-delay: 1.5s; }
  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  /* 标题区 */
  .header {
    text-align: center;
    padding: 24px 16px 12px;
    position: relative;
    z-index: 10;
    animation: floatUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  .header .logo { font-size: 42px; margin-bottom: 4px; }
  .header h1 {
    font-family: 'Luckiest Guy', 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    color: var(--pineapple);
    text-shadow: 2px 2px 0 #c78500, 0 0 20px rgba(255,215,0,0.4);
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }
  /* 内容区 */
  .content-area {
    margin: 8px 16px;
    position: relative;
    z-index: 10;
    min-height: 340px;
    animation: floatUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }
  .tool-panel {
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 28px 20px;
    min-height: 340px;
    backdrop-filter: blur(10px);
    border: 3px solid rgba(255,215,0,0.25);
    box-shadow: 0 8px 32px rgba(0,119,182,0.2);
    text-align: center;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .tool-panel.active { display: flex; opacity: 1; transform: translateY(0); }
  /* 底部Tab */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    background: linear-gradient(180deg, rgba(0,119,182,0.9) 0%, #023e8a 100%);
    padding: 10px 8px 18px;
    border-top: 3px solid var(--pineapple);
    z-index: 20;
    animation: floatUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
  }
  .tab-btn {
    background: none;
    border: none;
    text-align: center;
    padding: 6px 10px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 62px;
    user-select: none;
    -webkit-user-select: none;
  }
  .tab-btn .icon { font-size: 26px; display: block; }
  .tab-btn .label { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .tab-btn.active { background: rgba(255,215,0,0.2); }
  .tab-btn.active .label { color: var(--pineapple); font-weight: bold; }
  .tab-btn:active { transform: scale(0.9); }
  /* 通用按钮 */
  .btn-bubble {
    background: linear-gradient(180deg, var(--pineapple) 0%, var(--pineapple-dark) 100%);
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    color: #8B6914;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,165,0,0.4);
    transition: transform 0.15s;
    letter-spacing: 1px;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-bubble:active { transform: scale(0.92); }
  /* 背景气泡 */
  .bubble {
    position: absolute;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
  }
  /* 水母 */
  .jellyfish-deco {
    position: absolute;
    font-size: 28px;
    animation: drift 12s ease-in-out infinite;
    pointer-events: none;
    opacity: 0.6;
  }
  @keyframes drift {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(30px) translateY(-15px); }
    50% { transform: translateX(-20px) translateY(-30px); }
    75% { transform: translateX(15px) translateY(-10px); }
  }
  .tool-icon { font-size: 52px; margin-bottom: 8px; }
  .tool-title {
    font-size: 18px;
    color: var(--deep-blue);
    margin-bottom: 16px;
    font-weight: bold;
  }
  .compliment-bubble {
    background: rgba(255,215,0,0.1);
    border: 2px dashed var(--pineapple);
    border-radius: 20px;
    padding: 20px 16px;
    margin-bottom: 16px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-dark);
    line-height: 1.6;
    position: relative;
  }
  .compliment-bubble.pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .bubble-particle {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    animation: particleUp 0.8s ease-out forwards;
  }
  @keyframes particleUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-80px) scale(0); opacity: 0; }
  }
  .fortune-shell { cursor: pointer; transition: transform 0.3s; }
  .fortune-shell.shaking { animation: shake 0.6s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-20deg); }
    40% { transform: rotate(20deg); }
    60% { transform: rotate(-15deg); }
    80% { transform: rotate(10deg); }
  }
  .fortune-result {
    background: linear-gradient(135deg, rgba(123,104,238,0.15), rgba(255,105,180,0.1));
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .fortune-stars { font-size: 24px; margin-bottom: 8px; }
  .fortune-color { font-size: 14px; color: #666; margin-bottom: 4px; }
  .fortune-color span {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 50%;
    vertical-align: middle;
    margin-left: 6px;
    border: 2px solid rgba(0,0,0,0.1);
  }
  .fortune-advice { font-size: 16px; color: var(--text-dark); line-height: 1.5; font-weight: bold; }
  .fortune-placeholder { color: #999; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
  .jellyfish-mode { display: flex; gap: 10px; margin-bottom: 16px; justify-content: center; }
  .mode-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 2px solid var(--coral);
    background: transparent;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 14px;
    cursor: pointer;
    color: var(--coral);
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  .mode-btn.active { background: var(--coral); color: #fff; }
  .msg-input {
    width: 100%;
    border: 2px solid rgba(123,104,238,0.3);
    border-radius: 16px;
    padding: 14px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 15px;
    resize: none;
    background: rgba(255,255,255,0.6);
    margin-bottom: 16px;
    color: var(--text-dark);
  }
  .msg-input:focus { outline: none; border-color: var(--coral); }
  .msg-input::placeholder { color: #bbb; }
  .jellyfish-output {
    margin-top: 16px;
    background: rgba(255,105,180,0.08);
    border-radius: 16px;
    padding: 16px;
    border: 2px dashed var(--jellyfish);
    animation: fadeUp 0.4s ease;
  }
  .output-text {
    font-size: 14px;
    color: var(--text-dark);
    word-break: break-all;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .copy-btn {
    background: var(--jellyfish);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }
  .copy-btn:active { transform: scale(0.92); }
  .jellyfish-spark { position: relative; }
  .spark {
    position: absolute;
    pointer-events: none;
    color: var(--jellyfish);
    font-size: 16px;
    animation: sparkBurst 0.7s ease-out forwards;
  }
  @keyframes sparkBurst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
  }
.love-inputs {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
}
.love-input {
  flex: 1;
  border: 2px solid rgba(255,105,180,0.3);
  border-radius: 16px;
  padding: 12px 16px;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 15px;
  text-align: center;
  background: rgba(255,255,255,0.6);
  color: var(--text-dark);
}
.love-input:focus { outline: none; border-color: var(--jellyfish); }
.love-input::placeholder { color: #ccc; }
.love-plus { font-size: 24px; }
.love-result {
  margin-top: 16px;
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes bounceIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.love-percent {
  font-family: 'Luckiest Guy', 'ZCOOL KuaiLe', cursive;
  font-size: 42px;
  color: var(--jellyfish);
  margin-bottom: 8px;
}
.love-bar-container {
  width: 100%;
  height: 16px;
  background: rgba(0,0,0,0.05);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
}
.love-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--jellyfish), var(--pineapple));
  border-radius: 8px;
  transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 0;
}
.love-comment {
  font-size: 15px;
  color: var(--text-dark);
  line-height: 1.5;
  font-weight: bold;
}
@keyframes floatUp {
  0% { transform: translateY(-40px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
.tab-btn:focus-visible {
  outline: 3px solid var(--pineapple);
  outline-offset: 2px;
}
.btn-bubble:focus-visible {
  outline: 3px solid var(--pineapple);
  outline-offset: 2px;
}
.mode-btn:focus-visible {
  outline: 2px solid var(--coral);
  outline-offset: 2px;
}
.love-input:focus-visible, .msg-input:focus-visible {
  outline: 2px solid var(--coral);
  outline-offset: 1px;
}
</style>
</head>
<body>
<div class="phone-frame" id="app">
  <div class="seaweed left">🌿</div>
  <div class="seaweed right">🌿</div>
  <div class="jellyfish-deco" style="top:12px;right:20px;animation-delay:0s;">🪼</div>
  <div class="jellyfish-deco" style="top:80px;left:16px;font-size:18px;animation-delay:5s;">🪼</div>

  <div class="header">
    <div class="logo">🍍</div>
    <h1>比奇堡娱乐中心</h1>
    <div class="subtitle">由海绵宝宝独家冠名播出 🧽</div>
  </div>

  <div class="content-area" id="contentArea">
    <div class="tool-panel active" id="panel-0" role="tabpanel">
      <div class="tool-icon">🧽</div>
      <h2 class="tool-title">海绵宝宝的夸夸气泡</h2>
      <div class="compliment-bubble" id="complimentText">
        戳一下泡泡<br>收获今日份快乐 ✨
      </div>
      <button class="btn-bubble" id="praiseBtn">🫧 吹一个泡泡</button>
      <div class="bubble-burst" id="bubbleBurst" style="position:relative;"></div>
    </div>
    <div class="tool-panel" id="panel-1" role="tabpanel">
      <div class="tool-icon fortune-shell" id="shellIcon">🐚</div>
      <h2 class="tool-title">神奇海螺的预言</h2>
      <div class="fortune-result" id="fortuneResult" style="display:none;">
        <div class="fortune-stars" id="fortuneStars"></div>
        <div class="fortune-color" id="fortuneColor"></div>
        <div class="fortune-advice" id="fortuneAdvice"></div>
      </div>
      <div class="fortune-placeholder" id="fortunePlaceholder">
        拉一下神奇海螺<br>它会告诉你今天的命运 👇
      </div>
      <button class="btn-bubble" id="shellBtn">🐚 问问神奇海螺</button>
    </div>
    <div class="tool-panel" id="panel-2" role="tabpanel">
      <div class="tool-icon">🪼</div>
      <h2 class="tool-title">水母传信</h2>
      <div class="jellyfish-mode">
        <button class="mode-btn active" id="modeEncrypt">🔐 加密</button>
        <button class="mode-btn" id="modeDecrypt">🔓 解密</button>
      </div>
      <textarea class="msg-input" id="msgInput" placeholder="在这里输入你的悄悄话..." rows="3"></textarea>
      <button class="btn-bubble" id="jellyBtn">⚡ 水母发电</button>
      <div class="jellyfish-output" id="jellyOutput" style="display:none;">
        <div class="output-text" id="outputText"></div>
        <button class="copy-btn" id="copyBtn">📋 复制密文</button>
      </div>
      <div class="jellyfish-spark" id="jellySpark"></div>
    </div>
    <div class="tool-panel" id="panel-3" role="tabpanel">
      <div class="tool-icon">🦀</div>
      <h2 class="tool-title">痞老板的爱意公式</h2>
      <div class="love-inputs">
        <input class="love-input" id="name1" placeholder="你的名字" maxlength="10">
        <div class="love-plus">💕</div>
        <input class="love-input" id="name2" placeholder="TA的名字" maxlength="10">
      </div>
      <button class="btn-bubble" id="loveBtn">🧪 计算爱意值</button>
      <div class="love-result" id="loveResult" style="display:none;">
        <div class="love-percent" id="lovePercent"></div>
        <div class="love-bar-container">
          <div class="love-bar-fill" id="loveBarFill"></div>
        </div>
        <div class="love-comment" id="loveComment"></div>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="0" role="tab" aria-selected="true" aria-controls="panel-0"><span class="icon">🧽</span><span class="label">夸夸</span></button>
    <button class="tab-btn" data-tab="1" role="tab" aria-selected="false" aria-controls="panel-1"><span class="icon">🐚</span><span class="label">运势</span></button>
    <button class="tab-btn" data-tab="2" role="tab" aria-selected="false" aria-controls="panel-2"><span class="icon">🪼</span><span class="label">密语</span></button>
    <button class="tab-btn" data-tab="3" role="tab" aria-selected="false" aria-controls="panel-3"><span class="icon">🦀</span><span class="label">爱意值</span></button>
  </div>
</div>
<script>
// Tab switching
const tabBtns = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tool-panel');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
    panels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// Background bubbles
const appEl = document.getElementById('app');
function createBubble() {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const size = Math.random() * 20 + 8;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.bottom = '-30px';
  bubble.style.animationDuration = (Math.random() * 6 + 6) + 's';
  bubble.style.animationDelay = '0s';
  appEl.appendChild(bubble);
  setTimeout(() => bubble.remove(), 12000);
}
const bubbleInterval = setInterval(createBubble, 2000);
for (let i = 0; i < 5; i++) {
  setTimeout(() => createBubble(), i * 400);
}

// === 夸夸生成器 ===
const compliments = [
  "你比蟹老板还有钱！因为你拥有我的心 ❤️",
  "如果可爱能换蟹黄堡，你能养活整个比奇堡！🍔",
  "海绵宝宝抓水母还要用网，你抓我的心只用了一眼 👀",
  "派大星说：你是我见过最亮的星星！⭐",
  "珊迪都会嫉妒你的聪明才智！🐿️",
  "你的笑容比蟹黄堡秘方还珍贵！✨",
  "章鱼哥对你都说不出讨厌两个字 😤",
  "痞老板偷了一辈子秘方，都不及偷看你一眼 🦀",
  "你是比奇堡最靓的居民，没有之一！👑",
  "蟹老板愿意为你免费做一个蟹黄堡 🦀🍔",
  "海绵宝宝每天早上醒来想的第一个人就是你！🧽",
  "你的可爱程度已经超过了派大星的憨憨指数 📈",
  "比奇堡全体居民投票：你是最受欢迎的人类！🗳️",
  "连神奇海螺都说你很棒！🐚",
  "小蜗都为你鼓掌 👏🐌",
  "你的存在让比奇堡的海水都变甜了 🌊",
  "派大星说他愿意把最后一个蟹黄堡让给你 🍔❤️",
  "海绵宝宝：我准备好了！准备好爱你了！🧽💛",
  "你的美貌让水母田的水母都黯然失色 🪼",
  "珊迪说你的智商测试结果：满分！🧪",
  "蟹老板说他愿意花钱请你吃饭（这很罕见）💰",
  "你是比奇堡海滩上最耀眼的贝壳 🐚✨",
  "痞老板放弃偷秘方了，改偷你的心 💚",
  "海绵宝宝的菠萝屋欢迎你随时来做客！🍍",
  "你的魅力值：超过比奇堡所有居民的财产总和 📊",
  "派大星说你是他的'最好的最好朋友' 🥰",
  "连飞行荷兰人都想为你停留 ⛵",
  "泡泡先生表示你的快乐指数爆表 🫧",
  "你的可爱让比奇堡的太阳都更亮了 🌞",
  "虾霸说你比所有蟹黄堡加起来还美味 🍔💕"
];
let lastCompliments = [];
const MAX_HISTORY = 3;

function getCompliment() {
  const available = compliments.filter(c => !lastCompliments.includes(c));
  if (available.length === 0) {
    lastCompliments = [];
    return compliments[Math.floor(Math.random() * compliments.length)];
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  lastCompliments.push(pick);
  if (lastCompliments.length > MAX_HISTORY) lastCompliments.shift();
  return pick;
}

function burstBubbles() {
  const container = document.getElementById('bubbleBurst');
  const emojis = ['🫧', '💛', '✨', '🫧', '💫'];

function getDailyFortune() {
  const today = new Date().toISOString().slice(0, 10);
  let hash = 0;
  for (let i = 0; i < today.length; i++) {
    hash = ((hash << 5) - hash) + today.charCodeAt(i);
    hash |= 0;
  }
  const idx = Math.abs(hash) % fortunes.length;
  return fortunes[idx];
}

// === 水母密语 ===
let currentMode = 'encrypt';

function encryptMessage(text) {
  const b64 = btoa(unescape(encodeURIComponent(text)));
  const emojis = ['🪼', '⚡', '🐚', '🫧', '🌊', '💜', '🪸', '🐠'];
  let wrapped = '';
  for (let i = 0; i < b64.length; i++) {
    wrapped += b64[i];
    if ((i + 1) % 5 === 0) wrapped += emojis[Math.floor(Math.random() * emojis.length)];
  }
  return '🪼⚡' + wrapped + '⚡🪼';
}

function decryptMessage(cipher) {
  try {
    let cleaned = cipher.replace(/🪼⚡|⚡🪼/g, '').replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
    return decodeURIComponent(escape(atob(cleaned)));
  } catch(e) {
    return null;
  }
}

function sparkEffect(container) {
  const emojis = ['⚡', '💜', '✨', '🪼', '🔮'];
  for (let i = 0; i < 10; i++) {
    const spark = document.createElement('span');
    spark.className = 'spark';
    spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    spark.style.setProperty('--sx', (Math.random() * 100 - 50) + 'px');
    spark.style.setProperty('--sy', (Math.random() * -80 - 20) + 'px');
    spark.style.left = (Math.random() * 80 + 10) + '%';
    spark.style.top = '50%';
    container.appendChild(spark);
    setTimeout(() => spark.remove(), 800);
  }
}

document.getElementById('jellyBtn').addEventListener('click', function() {
  const input = document.getElementById('msgInput').value.trim();

  const outputDiv = document.getElementById('jellyOutput');

  sparkEffect(document.getElementById('jellySpark'));

  if (currentMode === 'encrypt') {
    outputText.textContent = encryptMessage(input);

  } else {
    const decrypted = decryptMessage(input);

    } else {
      outputText.textContent = '❌ 这好像不是水母密语...格式不对哦！';
    }
    document.getElementById('copyBtn').textContent = '📋 复制结果';
  }

  });
});

function loveHash(str1, str2) {
  let hash = 0;
  const combined = (str1 + str2).toLowerCase().trim();
  for (let i = 0; i < combined.length; i++) {
    hash = ((hash << 5) - hash) + combined.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getLovePercent(name1, name2) {
  const hash = loveHash(name1, name2);
  return 60 + (hash % 41); // 60-100%
}

function getLoveComment(percent) {
  if (percent >= 95) return loveComments.high[0];
  if (percent >= 85) return loveComments.high[Math.floor(Math.random() * loveComments.high.length)];
  if (percent >= 75) return loveComments.mid[Math.floor(Math.random() * loveComments.mid.length)];
  return loveComments.low[Math.floor(Math.random() * loveComments.low.length)];
}
