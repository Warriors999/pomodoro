<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #0f172a; color: #e2e8f0;
    user-select: none;
  }
  .container {
    text-align: center; padding: 2rem;
    background: #1e293b; border-radius: 2rem;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    min-width: 400px;
  }
  h1 { font-size: 1.5rem; font-weight: 500; color: #94a3b8; margin-bottom: 1.5rem; letter-spacing: 0.1em; }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: #0f172a; border-radius: 2rem; padding: 0.3rem; }
  .tab {
    flex: 1; padding: 0.6rem 1rem; border-radius: 2rem; border: none;
    background: transparent; color: #64748b; cursor: pointer;
    font-size: 0.875rem; transition: all 0.3s;
  }
  .tab.active { background: #3b82f6; color: #fff; font-weight: 600; }

  .timer-circle {
    position: relative; width: 280px; height: 280px; margin: 0 auto 2rem;
  }
  .timer-circle svg { transform: rotate(-90deg); }
  .timer-circle .bg { fill: none; stroke: #334155; stroke-width: 8; }
  .timer-circle .progress {
    fill: none;
    stroke: #3b82f6;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s ease;
  }
  .timer-circle .progress.break { stroke: #10b981; }
  .time-display {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; justify-content: center; align-items: center;
  }
  .time-text { font-size: 4rem; font-weight: 300; font-variant-numeric: tabular-nums; }
  .status-text { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }

  .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
  .btn {
    border: none; border-radius: 50%; cursor: pointer;
    transition: all 0.2s; font-size: 1.25rem;
  }
  .btn:active { transform: scale(0.95); }
  .btn-main {
    width: 64px; height: 64px;
    background: #3b82f6; color: #fff;
    font-size: 1.5rem; box-shadow: 0 4px 15px rgba(59,130,246,0.4);
  }
  .btn-main.running { background: #f59e0b; box-shadow: 0 4px 15px rgba(245,158,11,0.4); }
  .btn-secondary {
    width: 48px; height: 48px;
    background: #334155; color: #e2e8f0;
    font-size: 1rem;
  }
  .btn-secondary:hover { background: #475569; }

  .stats { color: #64748b; font-size: 0.875rem; }
  .stats span { color: #e2e8f0; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <h1>🍅 番茄钟</h1>

  <div class="tabs">
    <button class="tab active" data-mode="work" data-min="25">专注</button>
    <button class="tab" data-mode="short" data-min="5">短休息</button>
    <button class="tab" data-mode="long" data-min="15">长休息</button>
  </div>

  <div class="timer-circle">
    <svg width="280" height="280" viewBox="0 0 280 280">
      <circle class="bg" cx="140" cy="140" r="130"/>
      <circle class="progress" id="progress" cx="140" cy="140" r="130"
              stroke-dasharray="816.8" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time-text" id="timer">25:00</div>
      <div class="status-text" id="status">准备开始</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="resetBtn" title="重置">↺</button>
    <button class="btn btn-main" id="startBtn" title="开始">▶</button>
    <button class="btn btn-secondary" id="skipBtn" title="跳过">⏭</button>
  </div>

  <div class="stats">
    已完成 <span id="count">0</span> 个番茄
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 130; // ~816.8

const modes = {
  work: 25 * 60,
  short: 5 * 60,
  long: 15 * 60,
};

let currentMode = 'work';
let totalSeconds = modes.work;
let remaining = totalSeconds;
let intervalId = null;
let pomodoroCount = 0;

const $timer = document.getElementById('timer');
const $status = document.getElementById('status');
const $progress = document.getElementById('progress');
const $startBtn = document.getElementById('startBtn');
const $resetBtn = document.getElementById('resetBtn');
const $skipBtn = document.getElementById('skipBtn');
const $count = document.getElementById('count');
const $tabs = document.querySelectorAll('.tab');

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function setOffset(pct) {
  $progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
}

function tick() {
  if (remaining <= 0) {
    clearInterval(intervalId);
    intervalId = null;
    onSessionEnd();
    return;
  }
  remaining--;
  $timer.textContent = fmt(remaining);
  setOffset(remaining / totalSeconds);
}

function onSessionEnd() {
  notify();
  if (currentMode === 'work') {
    pomodoroCount++;
    $count.textContent = pomodoroCount;
  }
  switchMode(currentMode === 'work' ? 'short' : 'work');
  $status.textContent = '准备开始';
}

function startTimer() {
  if (intervalId) {
    // pause
    clearInterval(intervalId);
    intervalId = null;
    $startBtn.textContent = '▶';
    $startBtn.classList.remove('running');
    $status.textContent = '已暂停';
    return;
  }
  if (remaining <= 0) remaining = totalSeconds;
  intervalId = setInterval(tick, 1000);
  $startBtn.textContent = '⏸';
  $startBtn.classList.add('running');
  $status.textContent = currentMode === 'work' ? '专注中...' : '休息中...';
}

function resetTimer() {
  clearInterval(intervalId);
  intervalId = null;
  remaining = totalSeconds;
  $timer.textContent = fmt(remaining);
  setOffset(0);
  $startBtn.textContent = '▶';
  $startBtn.classList.remove('running');
  $status.textContent = '准备开始';
}

function switchMode(mode) {
  clearInterval(intervalId);
  intervalId = null;
  currentMode = mode;
  totalSeconds = modes[mode];
  remaining = totalSeconds;
  $timer.textContent = fmt(remaining);
  setOffset(0);
  $startBtn.textContent = '▶';
  $startBtn.classList.remove('running');

  $tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  $progress.classList.toggle('break', mode !== 'work');
  $status.textContent = '准备开始';
}

function notify() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch (_) {}
}

$startBtn.addEventListener('click', startTimer);
$resetBtn.addEventListener('click', resetTimer);
$skipBtn.addEventListener('click', () => {
  remaining = 0;
  tick();
  clearInterval(intervalId);
  intervalId = null;
  onSessionEnd();
});

$tabs.forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

// Initialize
setOffset(0);
</script>
</body>
</html>
